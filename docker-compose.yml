services:
  db:
    image: postgres:15-alpine
    container_name: rei-do-chopp-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=reidochopp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    ports:
      - "5432:5432" 

  api:
    image: ghcr.io/bernardoabaurre/rei-do-chopp-api:latest
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=ReiDoChopp;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False
    depends_on:
      - db
    restart: always

  frontend:
    image: ghcr.io/bernardoabaurre/rei-do-chopp-site:latest
    ports:
      - "80:80"
    environment:
      - API_URL=http://104.236.2.50:5000
    restart: always

volumes:
  postgres_data:

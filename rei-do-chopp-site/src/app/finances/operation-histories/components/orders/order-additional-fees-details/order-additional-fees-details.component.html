<table *ngIf="response.Total > 0" class="table table-white table-sm mb-0 table border-start border-end">
  <thead class="">
    <tr>
      <th>Descrição</th>
      <th>Valor</th>
    </tr>
  </thead>
  <tbody *ngFor="let item of response.Data">
    <tr>
      <td>{{item?.Description}}</td>
      <td>{{item?.Value | currency: 'BRL'}}</td>
    </tr>
  </tbody>
</table>

<div class=" text-center text-muted" *ngIf="response?.Total === 0">
  Nenhum item encontrado.
</div>

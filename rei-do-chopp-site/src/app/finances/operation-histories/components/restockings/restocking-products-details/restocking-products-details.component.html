<table *ngIf="response.Total > 0" class="table table-white table-sm mb-0 table brestocking-start brestocking-end">
  <thead class="">
    <tr>
      <th>Produto</th>
      <th>Preço Pago (un)</th>
      <th>Quantidade</th>
      <th>Preço Total Pago</th>
    </tr>
  </thead>
  <tbody *ngFor="let item of response.Data">
    <tr>
      <td>{{item?.Product?.Description}}</td>
      <td>{{item?.UnitPricePaid | currency: 'BRL'}}</td>
      <td>{{item?.Quantity}} un</td>
      <td>{{item?.TotalPricePaid| currency: 'BRL'}}</td>
    </tr>
  </tbody>
</table>

<div class=" text-center text-muted" *ngIf="response?.Total === 0">
  Nenhum item encontrado.
</div>

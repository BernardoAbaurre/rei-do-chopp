<form [formGroup]="form" (submit)="askReset()">
  <label class="me-3">
    <input class="shadow-sm" type="radio" formControlName="ResetMode" value="stock"> Apagar histórico de operações e estoque
  </label>
  <label>
    <input class="shadow-sm" type="radio" formControlName="ResetMode" value="base"> Apagar toda a base de dados
  </label>

  <div class="mt-3 col-3">
    <label class="form-label">Senha</label>
    <input appFormControl type="password" formControlName="Password" class="form-control shadow-sm" placeholder="Insira sua senha">
    <app-form-invalid-message
            [form]="form"
            prop="Password"
    ></app-form-invalid-message>
  </div>

  <div class="mt-3 text-center">
    <button type="submit" class="btn shadow-sm text-white btn-primary" [disabled]="form.invalid">Confirmar</button>
  </div>
</form>

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
  <div class="row shadow rounded-4 overflow-hidden w-100" style="max-width: 900px; min-height: 500px;">

    <div class="col-md-6 d-flex align-items-center justify-content-center bg-warning bg-opacity-25">
      <img src="assets/logo-rei-do-chopp.png" alt="Rei do Chopp"
           class="img-fluid p-4" style="max-height: 300px;" />
    </div>

    <div class="col-md-6 bg-white p-5 d-flex flex-column justify-content-center">
      <h3 class="mb-4 text-center">Alterar senha</h3>

      <form [formGroup]="form" (ngSubmit)="send()">

        <div class="col-md-12 form-group mb-3">
          <label for="status" class="form-label">Senha</label>

          <div class="input-group">
            <input [type]="passwordInputType" class="form-control" formControlName="Password">
            <button class="btn btn-outline-secondary" type="button" (mouseup)="passwordInputType = 'password'" (mousedown)="passwordInputType = 'text'" ><i class="bi bi-eye-fill"></i></button>
          </div>

          <app-form-invalid-message
            [form]="form"
            prop="Password"
          ></app-form-invalid-message>
        </div>

        <div class="col-md-12 form-group mb-3">
          <label for="status" class="form-label">Verificar Senha</label>

          <div class="input-group">
            <input [type]="passwordInputType" class="form-control" formControlName="CheckPassword" appFormControl>
            <button class="btn btn-outline-secondary" type="button" (mouseup)="passwordInputType = 'password'" (mousedown)="passwordInputType = 'text'" ><i class="bi bi-eye-fill"></i></button>
          </div>

          <div *ngIf="form.get('CheckPassword').hasError('passwordsMismatch') && form.get('CheckPassword').touched" class="invalid-feedback d-block">
            {{ form.get('CheckPassword').getError('passwordsMismatch') }}
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid">
          Salvar
        </button>
      </form>
    </div>

  </div>
</div>

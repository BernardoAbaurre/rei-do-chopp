<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
  <div class="row shadow rounded-4 overflow-hidden w-100" style="max-width: 900px; min-height: 500px;">

    <div class="col-md-6 d-flex align-items-center justify-content-center bg-warning bg-opacity-25">
      <img src="assets/logo-rei-do-chopp.png" alt="Rei do Chopp"
           class="img-fluid p-4" style="max-height: 300px;" />
    </div>

    <div class="col-md-6 bg-white p-5 d-flex flex-column justify-content-center">
      <h3 class="mb-4 text-center">Bem-vindo ao Rei do Chopp 🍻</h3>

      <form [formGroup]="formLogin" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input
            type="email"
            id="email"
            formControlName="Email"
            class="form-control"
            [ngClass]="{'is-invalid': formLogin.get('Email').touched && formLogin.get('Email')?.invalid}"
            placeholder="exemplo@dominio.com"
            autocomplete="false"
          />
          <div class="invalid-feedback" *ngIf="formLogin.get('Email').touched && formLogin.get('Email')?.errors?.['required']">
            O e-mail é obrigatório.
          </div>
          <div class="invalid-feedback" *ngIf="formLogin.get('Email').touched && formLogin.get('Email')?.errors?.['email']">
            Informe um e-mail válido.
          </div>
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input
            type="password"
            id="senha"
            autocomplete="false"
            formControlName="Password"
            class="form-control"
            [ngClass]="{'is-invalid': formLogin.get('Password').touched && formLogin.get('Password')?.invalid}"
            placeholder="Digite sua senha"
          />
          <div class="invalid-feedback" *ngIf="formLogin.get('Password').touched && formLogin.get('Password')?.errors?.['required']">
            A senha é obrigatória.
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Entrar
        </button>

        <p class="text-primary text-center mt-3" style="cursor: pointer;" (click)="openForgotPasswordModal()">Esqueci minha senha</p>
      </form>
    </div>

  </div>
</div>

<div class="container mt-4">
  <h3>Produtos e Estoque</h3>
  <div class="card mb-2">
    <div class="card-body">
      <form [formGroup]="filterForm" class="row g-3 align-items-end">
        <div class="col-md-6">
          <label class="form-label">Nome</label>
          <input type="text" class="form-control" formControlName="Name" placeholder="Nome do usuário"
            autocomplete="off" />
        </div>
        <div class="col-md-2">
          <label class="form-label">Cargos</label>
          <app-roles-select formControlName="RoleIds"></app-roles-select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Status</label>
          <ng-select [items]="statusOptions" bindLabel="Description" bindValue="Value" formControlName="Active" />
        </div>
        <div class="col-md-2">
          <button class="btn btn-secondary w-100" (click)="resetForm()" type="button">
            <i class="bi bi-eraser"></i>
            Limpar
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="col-12 text-end">
        <button class="btn btn-primary me-1" (click)="openUserRegisterModal()">
          <i class="bi bi-plus-lg"></i>
          Novo Usuário
        </button>

      </div>
      <div class="table py-4" *ngIf="response.Total > 0">
        <table class="table align-middle ">
          <thead>
            <tr>
              <th class="text-center"></th>
              <th class="text-center">Nome<app-sort-button [request]="usersRequest" prop="Name" (sort)="list()" />
              </th>
              <th class="text-center">Cargo </th>
              <th class="text-center">Status <app-sort-button [request]="usersRequest" prop="Active" (sort)="list()" />
              </th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of response.Data">
              <td class="text-center">
                <div class="btn-group dropend" role="group" aria-label="Button group with nested dropdown">
                  <button type="button" class="btn btn-secondary btn-sm"><i class="bi bi-gear"></i></button>
                  <div class="btn-group" role="group">
                    <button type="button" class="btn btn-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown"
                      aria-expanded="false">
                    </button>
                    <ul class="dropdown-menu">
                      <li><button class="dropdown-item btn" (click)="openUserRegisterModal(item)">Editar</button></li>
                      <li><a class="dropdown-item btn" (click)="changeStatus(item)">{{item.Active ? 'Inativar' :
                          'Ativar'}}</a></li>
                    </ul>
                  </div>
                </div>
              </td>
              <td class="text-center">{{ item.FullName }}</td>
              <td class="text-center">
                <span *ngFor="let role of item.Roles" class="badge text-bg-primary">{{role.Name}}</span>
              </td>
              <td class="text-center"><app-active-badge [active]="item.Active" /></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="mt-3 text-center text-muted" *ngIf="response.Total === 0">
        Nenhum item encontrado.
      </div>

      <app-pagination (pageChanged)="list()" [request]="usersRequest" [response]="response"></app-pagination>
    </div>
  </div>
</div>

<div class="d-flex justify-content-between align-items-center mt-4 pt-3 flex-wrap gap-3 border-top">
  <div class="d-flex align-items-center gap-2">
    <label for="pageSize" class="form-label mb-0 fw-500 text-muted">Itens por página:</label>
    <select id="pageSize" class="form-select form-select-sm w-auto" [ngModel]="request.PageSize" (ngModelChange)="setPageSize($event)" style="border-color: #dee2e6;">
      <option *ngFor="let size of pageSizes" [value]="size">{{ size }}</option>
    </select>
  </div>

  <nav>
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" [class.disabled]="request.Page <= 1">
        <button class="page-link" (click)="previousPage()" aria-label="Página anterior">«</button>
      </li>

      <li *ngFor="let page of pages" class="page-item"
          [class.active]="page === request.Page"
          [class.disabled]="page === '...'">
        <button class="page-link" (click)="goToPage(+page)" [disabled]="page === '...'" [attr.aria-label]="page === '...' ? 'Mais páginas' : 'Página ' + page">{{ page }}</button>
      </li>

      <li class="page-item" [class.disabled]="request.Page >= response.PageCount">
        <button class="page-link" (click)="nextPage()" aria-label="Próxima página">»</button>
      </li>
    </ul>
  </nav>

  <p class="text-muted mb-0 fw-500" style="font-size: 0.9rem;">Exibindo <strong>{{response.Data?.length}}</strong> de <strong>{{response.Total}}</strong> registros</p>
</div>

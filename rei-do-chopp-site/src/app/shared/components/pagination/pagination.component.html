<div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
  <div class="d-flex align-items-center gap-2">
    <label for="pageSize" class="form-label mb-0">Itens por página:</label>
    <select id="pageSize" class="form-select form-select-sm w-auto" [ngModel]="request.PageSize" (ngModelChange)="setPageSize($event)">
      <option *ngFor="let size of pageSizes" [value]="size">{{ size }}</option>
    </select>
  </div>

  <nav>
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" [class.disabled]="request.Page <= 1">
        <button class="page-link" (click)="previousPage()">«</button>
      </li>

      <li *ngFor="let page of pages" class="page-item"
          [class.active]="page === request.Page"
          [class.disabled]="page === '...'">
        <button class="page-link" (click)="goToPage(+page)" [disabled]="page === '...'">{{ page }}</button>
      </li>

      <li class="page-item" [class.disabled]="request.Page >= response.PageCount">
        <button class="page-link" (click)="nextPage()">»</button>
      </li>
    </ul>
  </nav>

  <p class="text-center my-auto">Exibindo {{response.Data?.length}} de {{response.Total}} registros</p>
</div>

<nav class="navbar bg-body-tertiary fixed-top bg-dark border-bottom border-body" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand align-text-center d-flex align-items-center" href="/hub">
      <img src="assets/logo-rei-do-chopp.png" alt="Logo" width="40" height="40" class="d-inline-block m-0 me-2">
      <div>Rei Do Chopp</div>
    </a>

    <ul class="nav nav-underline text-align-center m-auto">
      <li class="nav-item" *ngFor="let page of pagesSet">
        <a
          class="nav-link text-light"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          [routerLink]="page.Url">
            <i [ngClass]="page.Icon" class="fs-6 me-1"></i> {{page.Name}}
        </a>
      </li>
    </ul>

    <div class="dropdown text-light me-3" style="width: fit-content;">
      <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
        <span>{{user?.FirstName}} {{user?.LastName}}</span>
      </a>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" (click)="logout()">Sair</a></li>
      </ul>
    </div>

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Rei Do Chopp</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <form class="d-flex mb-3" role="search" [formGroup]="form" (input)="clear()">
          <input class="form-control me-2" formControlName="searchInput" type="search" placeholder="Search" aria-label="Search">
        </form>
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li class="nav-item" *ngFor="let page of pages">
            <a class="nav-link active" aria-current="page" [href]="page.Url"> <i [ngClass]="page.Icon" class="fs-3 me-1"></i> {{page.Name}}</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<nav class="navbar navbar-expand-lg fixed-top shadow-sm" style="background: linear-gradient(135deg, #D9534F 0%, #C64744 100%);" data-bs-theme="dark">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand d-flex align-items-center fw-bold fs-5" href="/hub" style="letter-spacing: 0.5px;">
      <img src="assets/logo-rei-do-chopp.png" alt="Logo" width="40" height="40" class="d-inline-block me-2" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
      <span class="text-white">Rei Do Chopp</span>
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse d-none d-lg-flex" id="navbarNav">
      <ul class="nav nav-pills gap-2 m-auto">
        <li class="nav-item" *ngFor="let page of pagesSet">
          <a
            class="nav-link text-white px-3 py-2 rounded-pill"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
            [routerLink]="page.Url"
            style="transition: all 0.3s ease; font-size: 0.9rem;">
              <i [ngClass]="page.Icon" class="me-2"></i> {{page.Name}}
          </a>
        </li>
      </ul>
    </div>

    <div class="dropdown ms-auto me-3" style="width: fit-content;">
      <a class="nav-link dropdown-toggle text-white d-flex align-items-center gap-2" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-person-circle"></i>
        <span class="d-none d-lg-inline" style="font-size: 0.9rem;">{{user?.FirstName}}</span>
      </a>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm">
        <li><a class="dropdown-item py-2" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
      </ul>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel" style="background: linear-gradient(135deg, #D9534F 0%, #C64744 100%);">
      <div class="offcanvas-header border-bottom border-light border-opacity-25">
        <h5 class="offcanvas-title text-white fw-bold" id="offcanvasNavbarLabel">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1">
          <li class="nav-item" *ngFor="let page of pages">
            <a class="nav-link text-white rounded-3 px-3 py-2 mb-2" [href]="page.Url" style="transition: all 0.3s ease;" (click)="closeOffcanvas($event)"> 
              <i [ngClass]="page.Icon" class="me-2"></i> {{page.Name}}
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

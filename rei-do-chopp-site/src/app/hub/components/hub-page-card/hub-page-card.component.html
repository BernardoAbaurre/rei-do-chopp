<a [href]="link" style="text-decoration: none; cursor: pointer;" class="card w-100 d-block m-3 p-1">
  <div class="d-flex">
    <div class="col-5 text-center p-1">
      <i [class]="icon" style="font-size: 90px;"></i>
    </div>
    <div class="col-7 p-1 ps-3 d-flex justify-content-center flex-column">
      <h5>{{title}}</h5>
      <p class="card-text">{{description}}</p>
    </div>
  </div>
</a>

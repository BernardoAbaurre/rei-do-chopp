name: Build and Deploy

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: bernardoabaurre

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./rei-do-chopp-api
          file: ./Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rei-do-chopp-api:latest
          provenance: false

      - name: Build and push Site image
        uses: docker/build-push-action@v5
        with:
          context: ./rei-do-chopp-site
          file: ./Dockerfile.angular
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rei-do-chopp-site:latest
          provenance: false

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 104.236.2.50
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e  # Exit on any error

            cd /root/rei-do-chopp

            echo "📦 Pulling latest images..."
            docker-compose pull

            echo "🛑 Stopping old containers..."
            docker-compose down

            echo "🚀 Starting new containers..."
            docker-compose up -d

            echo "✅ Deployment successful! Now cleaning old images..."

            # Remove ALL images not currently in use by any container
            # This keeps ONLY the images referenced by running containers (current deployment)
            docker image prune -a --force

            # Remove any stopped containers
            docker container prune -f

            # Remove unused volumes
            docker volume prune -f

            # Clean build cache
            docker buildx prune -a -f

            echo "🧹 Cleanup complete!"
            echo ""
            echo "📊 Current Docker images in use:"
            docker images --filter "dangling=false" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

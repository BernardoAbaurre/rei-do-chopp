name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: bernardoabaurre

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./rei-do-chopp-api
          file: ./Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rei-do-chopp-api:latest
          provenance: false

      - name: Build and push Site image
        uses: docker/build-push-action@v5
        with:
          context: ./rei-do-chopp-site
          file: ./Dockerfile.angular
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/rei-do-chopp-site:latest
          provenance: false

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 104.236.2.50
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/rei-do-chopp
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker-compose up -d
